project:
  type: website

bibliography:
  - bib/shared.bib
  - bib/part1-clinical.bib
  - bib/part2-pathophysiology.bib
  - bib/part3-treatment.bib
  - bib/part4-research.bib
  - bib/part5-modeling.bib
  - bib/appendices.bib

website:
  site-url: "https://yannickloth.github.io/health-me-cfs/"
  title: "Myalgic Encephalomyelitis / Chronic Fatigue Syndrome"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Blog"
        href: blog/index.qmd
    right:
      - text: "Download PDF"
        href: loth2026-mecfs.pdf
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents: auto

format:
  html:
    theme:
      - sandstone
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    html-math-method: mathjax
    cite-method: citeproc
    crossref:
      sec-prefix: Section
      fig-prefix: Figure
      tbl-prefix: Table
      eq-prefix: Equation
