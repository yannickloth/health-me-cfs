project:
  type: website

bibliography:
  - bib/shared.bib
  - bib/part1-clinical.bib
  - bib/part2-pathophysiology.bib
  - bib/part3-treatment.bib
  - bib/part4-research.bib
  - bib/part5-modeling.bib
  - bib/appendices.bib

website:
  site-url: "https://yannickloth.github.io/health-me-cfs/"
  title: "Myalgic Encephalomyelitis / Chronic Fatigue Syndrome"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Blog"
        href: blog/index.qmd
    right:
      - text: "About"
        href: about.qmd
      - text: "Download PDF"
        href: loth2026-mecfs.pdf
      - icon: rss
        href: blog/index.xml
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents:
      - section: "Part I — Clinical Presentation"
        contents: part1-clinical/**
      - section: "Part II — Pathophysiology"
        contents: part2-pathophysiology/**
      - section: "Part III — Treatment"
        contents: part3-treatment/**
      - section: "Part IV — Research"
        contents: part4-research/**
      - section: "Part V — Modeling"
        contents: part5-modeling/**
      - section: "Appendices"
        contents: z-appendices/**

format:
  html:
    theme:
      - sandstone
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    html-math-method: mathjax
    cite-method: citeproc
    crossref:
      sec-prefix: Section
      fig-prefix: Figure
      tbl-prefix: Table
      eq-prefix: Equation
