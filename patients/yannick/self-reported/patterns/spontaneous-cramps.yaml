# MECHANISTIC HYPOTHESES
mechanistic_hypotheses:
  primary:
    label: "neuronal hyperexcitability / lower cramp threshold"
    plausibility: "moderate"
    reasoning: |
      Cramps at rest or minimal activity suggest lowered motor neuron excitability
      threshold, not mechanical overuse. Consistent with:
      - Ion channel dysregulation (TRPM3 channelopathy hypothesis in ME/CFS)
      - GPCR-mediated nociceptor sensitization (purinergic/adenosine axis)
      - Chronic sympathetic dominance altering motor neuron background tone

  secondary:
    label: "magnesium / electrolyte deficit"
    plausibility: "moderate"
    reasoning: |
      Mg²⁺ suppresses NMDA receptor excitability; deficiency lowers cramp threshold.
      Patient takes magnesium supplement but absorption/bioavailability variable.
      Intersects with GPCR pain pathways at the nociceptor level.
      See also: electrolyte-induced-pain-crash.yaml for electrolyte sensitivity context.

  tertiary:
    label: "autonomic-mediated muscle ischemia"
    plausibility: "low-moderate"
    reasoning: |
      Dysregulated β2-adrenergic GPCRs (Scheibenbogen autoantibody hypothesis) →
      impaired vasodilation in muscle vasculature → local ischemia → cramp trigger.
      Mestinon (↑ACh → M3 muscarinic GPCR) partially compensates but may be incomplete.

  gpcr_connection: |
    See notes/gpcr-muscle-pain.md for full GPCR pathway context.
    Purinergic (P2Y) and adenosine (A1/A2) GPCRs can maintain elevated nociceptor
    sensitization between episodes, lowering cramp threshold even without acute trigger.

# CLINICAL CONTEXT
clinical_context: |
  Patient priority: recovery. No experimental testing.
  Pattern should be monitored passively.
  Discuss with physician if frequency increases or locations expand.

# TRACKING RECOMMENDATIONS
tracking_recommendations:
  document_per_episode:
    - location
    - timing (time of day, activity context)
    - trigger (or "spontaneous")
    - duration
    - severity (1–10 or descriptive)
    - magnesium dose taken that day
    - hydration status
    - sleep quality previous night
    - whether same location repeated following day
  do_not:
    - "Modify treatment to test cramp hypotheses"
    - "Intentionally provoke episodes"

# RESEARCH CONTEXT
potential_relevance:
  - "TRPM3 channelopathy in ME/CFS (Scheibenbogen / Marshall-Gradisnik)"
  - "Ion channel dysfunction and neuronal hyperexcitability"
  - "Purinergic signaling abnormalities (Naviaux metabolomics)"
  - "Small fiber neuropathy and spontaneous cramps"
  - "β2-adrenergic autoantibodies and muscle perfusion"

# DOCUMENTATION STATUS
