patient_hypotheses:
  - id: "metabolic-flexibility-2026-03-04"
    title: "Impaired metabolic flexibility (fat oxidation) as fasting intolerance factor"
    description: >
      Patient observation: skipping one meal (lunch) led to severe weakness
      and generalized trembling by evening, rapidly resolved by eating supper.
      This is a recurring pattern — happens on multiple days, with or without
      stimulant use (not a Provigil-masking artifact). This disproportionate
      response to a single missed meal suggests impaired ability to switch
      from glucose to fat oxidation when carbohydrate stores deplete.
      Consistent with ME/CFS metabolomics literature showing reduced fatty
      acid oxidation capacity and hypometabolic state (Naviaux 2016, Germain
      2017). Compounded by ongoing soft stools reducing nutrient absorption
      efficiency. Patient is on Acetyl-L-Carnitine 1000mg daily since
      2026-01-22 (~6 weeks) — carnitine shuttle opening expected at weeks
      4-6, full fat-burning at months 3-6. Today's crash suggests the
      pathway is not yet robust enough to sustain energy through a missed meal.
    testable_prediction: >
      If this hypothesis is correct, the patient should tolerate fasting poorly
      compared to healthy individuals, and symptoms should consistently resolve
      with carbohydrate intake. A glucose tolerance test or metabolic panel
      during a fasting episode could confirm impaired metabolic switching.
      Fasting tolerance should improve over months 3-6 as carnitine shuttle
      matures under ALCAR supplementation.
    status: "observation-based, not yet tested"
    discuss_with_doctor: true

notes: >
