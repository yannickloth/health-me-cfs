  - id: extra_rilatine_compensatory_crash
    text: "Extra Rilatine MR 30mg on 2026-05-16 may have masked true fatigue during event, leading to compensatory crash on 2026-05-17 (borrowed energy effect)."
    status: patient_hypothesis
    falsifiable: true
    test: "If stimulant cessation reduces crash severity over subsequent similar events, supports borrowing hypothesis. If crash occurs regardless of stimulant use, suggests activity load alone sufficient for PEM."
  - id: evening_headache_mental_fog_pattern
    text: "Headache and mental fog appearing together in evening suggests shared mechanism - possibly neuroinflammation, cerebral hypoperfusion, or electrolyte dysregulation accumulating over day."
    status: patient_hypothesis
    falsifiable: true
    test: "If electrolyte supplementation or anti-inflammatory (LDN/famotidine) taken prevent evening symptoms, supports mechanism. If symptoms persist despite interventions, consider other pathways."
  - id: grief_emotional_aftereffects
