    rationale: >
      Switch to dopaminergic/microglial-modulating agent after ~6 months of
      LDN non-response (still tired daily; extended sleep helps more than LDN).
      LDA targets unrefreshing sleep and brain fog (Crosby2021LDA domains).
    prescriber: "Dr. Nicolas"
    monitoring: >
      Prescriber's efficacy-assessment window: 6 weeks (clinical experience).
      Watch early adverse effects: akathisia/restlessness, agitation, sleep
      disruption, nausea. Metabolic baseline (fasting glucose, HbA1c, insulin,
      lipids) and CYP2D6 status recommended per paper but not yet documented.
    notes: >
      0.5-1 mg requires compounding pharmacy (standard tablets >=2 mg).
      Dose ceiling (~1 mg) is within Crosby2021 range (mean 1.1 mg/day).

