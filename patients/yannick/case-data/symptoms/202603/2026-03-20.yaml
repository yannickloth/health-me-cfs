date: 2026-03-20

symptoms:
  pain_periarticular: true
  pain_periarticular_notes: >
    Periarticular pain at the knees during the night. Shoulders feel unrestorative —
    as though they didn't rest during sleep. Both present from early morning.
    Similar periarticular knee pain was also reported on 2026-03-16 (post-exertion).
    Today's onset is nocturnal/morning without a clear exertion trigger.
  fatigue_level: null
  cognitive_status: "OK"
  cognitive_notes: >
    Cognitive function OK this morning — much better than during LDN 4.5 mg
    period. No "drugged" or "strange" cognitive quality. Further confirms
    the cognitive impairment of the past ~2 weeks was LDN dose-related.
  nausea: null
  headache: null
  orthostatic_intolerance: null
  pain_positional_muscle_fatigue: true
  pain_positional_muscle_fatigue_notes: >
    When sitting, feels multiple pain zones — described as similar to the
    muscle fatigue one gets in the back from standing too long in one position.
    Multiple sites affected, not limited to one area. Present at rest (sitting),
    not requiring exertion to trigger. Consistent with postural muscle fatigue /
    low-threshold positional pain seen in ME/CFS.
  pem_active: null

sleep:
  quality: "non-restorative (partial)"
  notes: >
    Shoulders feel like they didn't rest/sleep — localised non-restorative
    sensation. Periarticular knee pain during the night may have disrupted
    sleep quality. Early morning symptoms suggest poor overnight recovery.

notes: >
  Day 3 without LDN. Night-time periarticular knee pain and unrestorative
  shoulder sensation from early morning. The "drugged" feeling and nausea
  from 4.5 mg LDN are not present — those symptoms appear to have resolved
  with the LDN pause. The periarticular pain and non-restorative sleep
  pattern may reflect baseline ME/CFS symptoms now visible without LDN's
  masking/modulating effect, or could be unrelated.
