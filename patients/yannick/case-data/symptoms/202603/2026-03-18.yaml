    description: >
      Patient questions whether LDN 4.5 mg is too high. Reports feeling
      worse/bad for approximately the 2 weeks since reaching maintenance dose
      (4.5 mg started ~2026-03-06). Today's symptom cluster — drugged feeling,
      somnolence, nausea, mild migraine, severe fatigue, cognitive strangeness —
      is consistent with LDN adverse effects at supra-therapeutic dose for
      this individual.
    action: "Discuss with prescribing physician. Consider dose reduction to 3 mg or 4 mg."

notes: >
  Dominant symptom cluster today: "drugged" feeling with severe fatigue/energylessness,
  marked somnolence (wants to sleep), mild nausea (feels close to vomiting), mild
  migraine, and qualitatively strange cognitive impairment. Patient attributes
  worsening to 2 weeks on LDN 4.5 mg (started ~2026-03-06) and questions whether
  the dose is too high. This symptom profile — sedation, nausea, cognitive
  disturbance — is a recognised pattern of LDN dose intolerance.
