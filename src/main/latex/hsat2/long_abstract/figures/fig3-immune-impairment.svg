<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 350" width="360" height="350">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #000000; }
      .title { font-size: 7pt; font-weight: bold; }
      .label { font-size: 5.5pt; }
      .small { font-size: 5pt; }
      .bold { font-weight: bold; }
    </style>
    <marker id="arrOrange" markerWidth="5" markerHeight="3.5" refX="5" refY="1.75" orient="auto">
      <polygon points="0,0 5,1.75 0,3.5" fill="#D55E00"/>
    </marker>
    <marker id="arrPink" markerWidth="5" markerHeight="3.5" refX="5" refY="1.75" orient="auto">
      <polygon points="0,0 5,1.75 0,3.5" fill="#CC79A7"/>
    </marker>
    <marker id="arrRed" markerWidth="5" markerHeight="3.5" refX="5" refY="1.75" orient="auto">
      <polygon points="0,0 5,1.75 0,3.5" fill="#D55E00"/>
    </marker>
  </defs>

  <rect width="360" height="350" fill="#ffffff"/>

  <text x="180" y="16" text-anchor="middle" class="title">HSAT2-mediated immune impairment through extracellular vesicles</text>

  <!-- ============================================================ -->
  <!-- Step 1: HSAT2 producing cell (top left)                      -->
  <!-- ============================================================ -->
  <ellipse cx="60" cy="55" rx="28" ry="16" fill="#CC79A7" stroke="#000000" stroke-width="0.5"/>
  <text x="60" y="52" text-anchor="middle" class="label bold">Producer</text>
  <text x="60" y="60" text-anchor="middle" class="label">cell</text>

  <!-- HSAT2 RNA inside cell -->
  <text x="60" y="75" text-anchor="middle" class="small bold" fill="#CC79A7">HSAT2 RNA</text>

  <!-- Arrow to EVs -->
  <line x1="60" y1="88" x2="60" y2="102" stroke="#D55E00" stroke-width="0.8" marker-end="url(#arrOrange)"/>

  <!-- EVs in bloodstream -->
  <text x="100" y="75" text-anchor="middle" class="small bold">→</text>

  <ellipse cx="120" cy="65" rx="16" ry="12" fill="#F0E442" stroke="#000000" stroke-width="0.4"/>
  <text x="120" y="63" text-anchor="middle" class="small bold">EV</text>
  <text x="120" y="71" text-anchor="middle" class="small">HSAT2</text>

  <ellipse cx="155" cy="75" rx="16" ry="12" fill="#F0E442" stroke="#000000" stroke-width="0.4"/>
  <text x="155" y="73" text-anchor="middle" class="small bold">EV</text>
  <text x="155" y="81" text-anchor="middle" class="small">HSAT2</text>

  <ellipse cx="190" cy="65" rx="16" ry="12" fill="#F0E442" stroke="#000000" stroke-width="0.4"/>
  <text x="190" y="63" text-anchor="middle" class="small bold">EV</text>
  <text x="190" y="71" text-anchor="middle" class="small">HSAT2</text>

  <!-- Blood circulation context -->
  <rect x="70" y="92" width="150" height="14" rx="7" fill="#FFDDDD" stroke="#E06060" stroke-width="0.4"/>
  <text x="145" y="102" text-anchor="middle" class="small bold">Extracellular vesicles in circulation</text>

  <!-- Arrow down to myeloid cells -->
  <line x1="145" y1="108" x2="145" y2="122" stroke="#D55E00" stroke-width="0.8" marker-end="url(#arrOrange)"/>

  <!-- Step 2: Uptake by immature myeloid cells -->
  <ellipse cx="145" cy="138" rx="32" ry="16" fill="#E69F00" stroke="#000000" stroke-width="0.5"/>
  <text x="145" y="134" text-anchor="middle" class="label bold">Immature</text>
  <text x="145" y="142" text-anchor="middle" class="label bold">myeloid cells</text>

  <!-- Arrow to MDSC -->
  <line x1="145" y1="156" x2="145" y2="170" stroke="#D55E00" stroke-width="0.8" marker-end="url(#arrOrange)"/>

  <!-- Step 3: MDSC expansion -->
  <rect x="95" y="174" width="100" height="28" rx="6" fill="#D55E00" stroke="#000000" stroke-width="0.5"/>
  <text x="145" y="185" text-anchor="middle" class="label bold" fill="#FFFFFF">MDSC expansion</text>
  <text x="145" y="195" text-anchor="middle" class="small" fill="#FFCCCC">(myeloid-derived</text>
  <text x="145" y="200" text-anchor="middle" class="small" fill="#FFCCCC">suppressor cells)</text>

  <!-- Soluble mediators annotation -->
  <text x="250" y="230" text-anchor="middle" class="label bold">Soluble</text>
  <text x="250" y="238" text-anchor="middle" class="label bold">mediators:</text>
  <text x="250" y="248" text-anchor="middle" class="small">IL-10</text>
  <text x="250" y="256" text-anchor="middle" class="small">IL-35</text>
  <text x="250" y="264" text-anchor="middle" class="small">IDO1</text>
  <text x="250" y="272" text-anchor="middle" class="small">TGF-β</text>

  <!-- Arrow from MDSC to mediators box -->
  <line x1="195" y1="195" x2="243" y2="230" stroke="#D55E00" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Two arrows down from MDSC -->
  <line x1="120" y1="204" x2="100" y2="240" stroke="#D55E00" stroke-width="0.8" marker-end="url(#arrOrange)"/>
  <line x1="170" y1="204" x2="190" y2="240" stroke="#D55E00" stroke-width="0.8" marker-end="url(#arrOrange)"/>

  <!-- NK cell suppression (left) -->
  <ellipse cx="85" cy="262" rx="28" ry="16" fill="#56B4E9" stroke="#000000" stroke-width="0.5"/>
  <text x="85" y="258" text-anchor="middle" class="label bold">NK cells</text>
  <text x="85" y="268" text-anchor="middle" class="small">suppressed</text>
  <text x="85" y="288" text-anchor="middle" class="small bold" fill="#D55E00">↓ cytotoxicity</text>

  <!-- CD8 T-cell exhaustion (right) -->
  <ellipse cx="205" cy="262" rx="28" ry="16" fill="#0072B2" stroke="#000000" stroke-width="0.5"/>
  <text x="205" y="258" text-anchor="middle" class="label bold" fill="#FFFFFF">CD8⁺ T cells</text>
  <text x="205" y="268" text-anchor="middle" class="small" fill="#CCFFFF">exhausted</text>
  <text x="205" y="288" text-anchor="middle" class="small bold" fill="#D55E00">↑ PD-1, TIM-3</text>

  <!-- Feed-forward loop (curved arrow back to top) -->
  <path d="M110 300 Q80 330 50 330 Q20 330 20 280 Q20 230 30 200 Q40 170 50 140 Q55 110 55 90" fill="none" stroke="#CC79A7" stroke-width="0.8" stroke-dasharray="4,3"/>
  <polygon points="55,90 52,96 58,96" fill="#CC79A7"/>
  <text x="12" y="230" text-anchor="middle" class="small bold" fill="#CC79A7" transform="rotate(-90,12,230)">feed-forward</text>

  <!-- Feed-forward text -->
  <text x="200" y="320" text-anchor="middle" class="small bold">Recipient cells release their own HSAT2-carrying EVs</text>
  <text x="200" y="330" text-anchor="middle" class="small">→ self-sustaining pathological loop</text>
</svg>
