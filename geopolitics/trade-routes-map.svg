<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Georgia, serif">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a2e"/>

  <!-- Simplified land masses - very abstract -->
  <!-- Europe -->
  <path d="M 420,250 L 480,220 L 530,230 L 560,210 L 590,220 L 610,250 L 620,290 L 600,320 L 580,350 L 560,380 L 530,390 L 500,380 L 480,350 L 460,330 L 440,310 L 420,290 Z" fill="#2c3e50" stroke="#34495e" stroke-width="1.5"/>
  <!-- Scandinavia -->
  <path d="M 500,140 L 520,120 L 540,130 L 560,150 L 570,180 L 560,210 L 530,230 L 510,210 L 500,180 Z" fill="#2c3e50" stroke="#34495e" stroke-width="1.5"/>
  <!-- UK -->
  <path d="M 400,230 L 420,220 L 430,240 L 420,260 L 400,250 Z" fill="#2c3e50" stroke="#34495e" stroke-width="1.5"/>
  <!-- Russia - large mass to the east -->
  <path d="M 620,120 L 900,100 L 950,150 L 920,200 L 880,230 L 820,250 L 750,260 L 700,250 L 660,230 L 630,200 L 620,160 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Middle East / Iran -->
  <path d="M 680,320 L 750,300 L 800,320 L 820,360 L 800,400 L 760,410 L 720,390 L 690,360 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Turkey -->
  <path d="M 610,310 L 680,300 L 700,320 L 680,340 L 630,340 L 610,320 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- North Africa -->
  <path d="M 380,420 L 500,410 L 600,420 L 650,440 L 620,480 L 500,490 L 400,480 L 370,450 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Sub-Saharan Africa -->
  <path d="M 430,500 L 550,490 L 600,520 L 620,600 L 580,680 L 520,720 L 470,700 L 440,640 L 420,560 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- India -->
  <path d="M 820,380 L 870,360 L 900,400 L 880,460 L 850,480 L 830,450 L 820,410 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- China -->
  <path d="M 900,200 L 1000,180 L 1060,220 L 1050,280 L 1020,320 L 960,340 L 920,320 L 900,280 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- South America (far left) -->
  <path d="M 150,480 L 200,450 L 230,500 L 240,580 L 220,660 L 190,700 L 160,660 L 140,580 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- North America / US -->
  <path d="M 50,180 L 200,150 L 280,180 L 300,230 L 280,280 L 220,300 L 150,290 L 80,260 L 50,220 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Canada -->
  <path d="M 80,100 L 250,80 L 300,110 L 280,150 L 200,150 L 100,140 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Greenland -->
  <path d="M 280,60 L 340,40 L 370,70 L 360,110 L 320,120 L 290,100 Z" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Japan -->
  <ellipse cx="1080" cy="260" rx="15" ry="35" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>
  <!-- Taiwan -->
  <ellipse cx="1040" cy="340" rx="8" ry="12" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="1"/>

  <!-- EU highlight glow -->
  <ellipse cx="530" cy="300" rx="80" ry="70" fill="none" stroke="#3498db" stroke-width="2" opacity="0.4"/>
  <text x="530" y="305" text-anchor="middle" fill="#3498db" font-size="16" font-weight="bold">EU</text>

  <!-- ARROWS AND LABELS -->

  <!-- EAST: Russia — CLOSED (red) -->
  <line x1="610" y1="270" x2="710" y2="220" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow-red)" stroke-dasharray="8,4"/>
  <text x="670" y="205" fill="#c0392b" font-size="11" font-weight="bold">EAST: RUSSIA</text>
  <text x="670" y="218" fill="#e74c3c" font-size="9">Sanctioned. Gas banned by 2028.</text>
  <!-- X mark -->
  <text x="660" y="248" fill="#c0392b" font-size="22" font-weight="bold">✕</text>

  <!-- SOUTHEAST: Iran — DESTROYED (red) -->
  <line x1="590" y1="360" x2="680" y2="350" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow-red)" stroke-dasharray="8,4"/>
  <text x="660" y="370" fill="#c0392b" font-size="11" font-weight="bold">SE: IRAN</text>
  <text x="660" y="383" fill="#e74c3c" font-size="9">Bombed. Hormuz closed.</text>
  <text x="640" y="345" fill="#c0392b" font-size="22" font-weight="bold">✕</text>

  <!-- SOUTH: Africa — CONTESTED (orange) -->
  <line x1="510" y1="390" x2="500" y2="470" stroke="#e67e22" stroke-width="3" marker-end="url(#arrow-orange)" stroke-dasharray="8,4"/>
  <text x="415" y="455" fill="#e67e22" font-size="11" font-weight="bold">SOUTH: AFRICA</text>
  <text x="415" y="468" fill="#f39c12" font-size="9">Contested. EU losing ground.</text>

  <!-- SOUTHWEST: Latin America — SEIZED (red) -->
  <line x1="440" y1="350" x2="250" y2="470" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow-red)" stroke-dasharray="8,4"/>
  <text x="230" y="440" fill="#c0392b" font-size="11" font-weight="bold">SW: LATIN AMERICA</text>
  <text x="230" y="453" fill="#e74c3c" font-size="9">"Donroe Doctrine." Venezuela seized.</text>

  <!-- NORTH: Arctic — CONTESTED (orange) -->
  <line x1="540" y1="220" x2="560" y2="140" stroke="#e67e22" stroke-width="3" marker-end="url(#arrow-orange)" stroke-dasharray="8,4"/>
  <text x="480" y="115" fill="#e67e22" font-size="11" font-weight="bold">NORTH: ARCTIC</text>
  <text x="480" y="128" fill="#f39c12" font-size="9">Russia-China duopoly. EU absent.</text>

  <!-- NORTHWEST: Canada — PRESSURED (orange) -->
  <line x1="420" y1="250" x2="310" y2="190" stroke="#e67e22" stroke-width="3" marker-end="url(#arrow-orange)" stroke-dasharray="8,4"/>
  <text x="280" y="165" fill="#e67e22" font-size="11" font-weight="bold">NW: CANADA</text>
  <text x="280" y="178" fill="#f39c12" font-size="9">Tariff wall. "51st state."</text>

  <!-- WEST: United States — OPEN (green, thick, solid) -->
  <line x1="420" y1="290" x2="300" y2="260" stroke="#27ae60" stroke-width="5" marker-end="url(#arrow-green)"/>
  <text x="140" y="280" fill="#27ae60" font-size="14" font-weight="bold">WEST: UNITED STATES</text>
  <text x="140" y="296" fill="#2ecc71" font-size="10">Open. Dependency accelerating.</text>
  <text x="140" y="312" fill="#2ecc71" font-size="9">LNG: 24% → 57-60%. Chips: 0% EU production.</text>
  <text x="140" y="326" fill="#2ecc71" font-size="9">Defense: 63% from US. €1.175T deal signed.</text>

  <!-- PACIFIC: China/Taiwan — UNDER PRESSURE (gray) -->
  <line x1="620" y1="290" x2="950" y2="290" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow-gray)" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="950" y="310" fill="#7f8c8d" font-size="10">CHINA: Cut off from</text>
  <text x="950" y="323" fill="#7f8c8d" font-size="10">EU by same closures</text>

  <!-- Hormuz chokepoint marker -->
  <circle cx="750" cy="390" r="8" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="760" y="405" fill="#c0392b" font-size="9">Hormuz</text>
  <text x="760" y="415" fill="#c0392b" font-size="8">CLOSED</text>

  <!-- Suez marker -->
  <circle cx="620" cy="420" r="6" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="630" y="418" fill="#e67e22" font-size="8">Suez: Houthi</text>
  <text x="630" y="428" fill="#e67e22" font-size="8">attacks</text>

  <!-- Greenland marker -->
  <circle cx="330" cy="80" r="6" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="345" y="75" fill="#e67e22" font-size="8">Greenland:</text>
  <text x="345" y="85" fill="#e67e22" font-size="8">US acquiring</text>

  <!-- IMEC route (thin, through Gulf) -->
  <path d="M 850,440 L 800,400 L 750,380 L 700,350 L 650,330 L 610,320" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="835" y="455" fill="#3498db" font-size="8">IMEC (US-backed)</text>
  <text x="835" y="465" fill="#3498db" font-size="8">Under missile fire</text>

  <!-- Legend -->
  <rect x="30" y="650" width="280" height="120" rx="8" fill="#16213e" stroke="#34495e" stroke-width="1"/>
  <line x1="50" y1="680" x2="90" y2="680" stroke="#c0392b" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="100" y="684" fill="#e0e0e0" font-size="11">Closed / Destroyed</text>
  <line x1="50" y1="705" x2="90" y2="705" stroke="#e67e22" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="100" y="709" fill="#e0e0e0" font-size="11">Contested / Under pressure</text>
  <line x1="50" y1="730" x2="90" y2="730" stroke="#27ae60" stroke-width="5"/>
  <text x="100" y="734" fill="#e0e0e0" font-size="11">Open — dependency growing</text>
  <line x1="50" y1="755" x2="90" y2="755" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="759" fill="#e0e0e0" font-size="11">US-backed alternative (IMEC)</text>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#ecf0f1" font-size="22" font-weight="bold">The Compass Has One Arrow Left</text>
  <text x="600" y="62" text-anchor="middle" fill="#bdc3c7" font-size="13">EU trade routes, March 2026 — every direction closed except west</text>

  <!-- Date -->
  <text x="1170" y="790" text-anchor="end" fill="#555" font-size="9">March 2026</text>
</svg>
